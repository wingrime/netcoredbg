name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake clang

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-linux
          path: |
            build/src/netcoredbg
            build/src/*.so
            build/src/*.dll
          if-no-files-found: warn

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        shell: cmd
        run: |
          cmake -B build

      - name: Build
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-windows
          path: |
            build/src/Release/netcoredbg.exe
            build/src/Release/*.dll
          if-no-files-found: warn

  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-macos-arm64
          path: |
            build/src/netcoredbg
            build/src/*.dylib
            build/src/*.dll
          if-no-files-found: warn

  build-macos-x64:
    name: macOS Intel (x64)
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-macos-x64
          path: |
            build/src/netcoredbg
            build/src/*.dylib
            build/src/*.dll
          if-no-files-found: warn

  release:
    name: Nightly Release
    if: github.ref == 'refs/heads/master'
    needs:
      - build-linux
      - build-windows
      - build-linux-interop
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly #${{ github.run_number }}"
          files: artifacts/**/*
          generate_release_notes: true
          makeLatest: true

  build-linux-interop:
    name: Linux (clang, INTEROP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake clang libunwind-dev libdw-dev

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build-interop \
            -DCMAKE_BUILD_TYPE=Release \
            -DINTEROP_DEBUGGING=1

      - name: Build
        run: |
          cmake --build build-interop -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-linux-interop
          path: |
            build-interop/src/netcoredbg
            build-interop/src/*.so
            build-interop/src/*.dll
          if-no-files-found: warn
