name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake clang liblttng-ust-dev lldb-dev

      - name: Clone diagnostics
        run: git clone --depth 1 https://github.com/dotnet/diagnostics.git

      - name: Build dbgshim
        run: |
          cd diagnostics && ./build.sh -skipmanaged -c Release

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release -DDBGSHIM_FROM_SOURCE=ON

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Copy dbgshim
        run: cp diagnostics/artifacts/bin/linux.x64.Release/libdbgshim.so build/src/

      - name: Install
        run: |
          cmake --install build --prefix staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-linux
          path: staging/

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone diagnostics
        run: git clone --depth 1 https://github.com/dotnet/diagnostics.git

      - name: Build dbgshim
        run: |
          cd diagnostics && .\Build.cmd -skipmanaged -c Release

      - name: Configure
        shell: cmd
        run: |
          cmake -B build -DDBGSHIM_FROM_SOURCE=ON

      - name: Build
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Copy dbgshim
        run: copy diagnostics\artifacts\bin\Windows_NT.x64.Release\dbgshim.dll build\src\

      - name: Install
        run: |
          cmake --install build --config Release --prefix staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-windows
          path: staging/

  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Clone diagnostics
        run: git clone --depth 1 https://github.com/dotnet/diagnostics.git

      - name: Build dbgshim
        run: |
          cd diagnostics && ./build.sh -skipmanaged -c Release

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release -DDBGSHIM_FROM_SOURCE=ON

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Copy dbgshim
        run: cp diagnostics/artifacts/bin/osx.arm64.Release/libdbgshim.dylib build/src/

      - name: Install
        run: |
          cmake --install build --prefix staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-macos-arm64
          path: staging/

  build-macos-x64:
    name: macOS Intel (x64)
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Clone diagnostics
        run: git clone --depth 1 https://github.com/dotnet/diagnostics.git

      - name: Build dbgshim
        run: |
          cd diagnostics && ./build.sh -skipmanaged -c Release

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release -DDBGSHIM_FROM_SOURCE=ON

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Copy dbgshim
        run: cp diagnostics/artifacts/bin/osx.x64.Release/libdbgshim.dylib build/src/

      - name: Install
        run: |
          cmake --install build --prefix staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-macos-x64
          path: staging/

  release:
    name: Nightly Release
    if: github.ref == 'refs/heads/master'
    needs:
      - build-linux
      - build-windows
      - build-linux-interop
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          gh release create nightly-${{ github.run_number }} \
            $(find artifacts -type f) \
            --title "Nightly #${{ github.run_number }}" \
            --generate-notes \
            --latest
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-linux-interop:
    name: Linux (clang, INTEROP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake clang libunwind-dev libdw-dev liblttng-ust-dev lldb-dev

      - name: Clone diagnostics
        run: git clone --depth 1 https://github.com/dotnet/diagnostics.git

      - name: Build dbgshim
        run: |
          cd diagnostics && ./build.sh -skipmanaged -c Release

      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -B build-interop \
            -DCMAKE_BUILD_TYPE=Release \
            -DINTEROP_DEBUGGING=1 \
            -DDBGSHIM_FROM_SOURCE=ON

      - name: Build
        run: |
          cmake --build build-interop -j$(nproc)

      - name: Copy dbgshim
        run: cp diagnostics/artifacts/bin/linux.x64.Release/libdbgshim.so build-interop/src/

      - name: Install
        run: |
          cmake --install build-interop --prefix staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-linux-interop
          path: staging/
